<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TradeSense - Indian Trader Dashboard</title>

<link rel="stylesheet" href="style.css">

<script src="https://s3.tradingview.com/tv.js"></script>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background:#0f172a;
color:white;
margin:0;
}

header{
background:#020617;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #1e293b;
}

header h1{
font-size:20px;
}

nav a{
color:#38bdf8;
margin-left:15px;
text-decoration:none;
}

.container{
display:grid;
grid-template-columns:3fr 1fr;
gap:20px;
padding:20px;
}

.chart{
background:#020617;
padding:10px;
border-radius:10px;
}

.tools{
background:#020617;
padding:20px;
border-radius:10px;
}

input,select,button{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:none;
}

button{
background:#38bdf8;
color:black;
font-weight:bold;
cursor:pointer;
}

.signal{
margin-top:20px;
padding:15px;
background:#111827;
border-radius:8px;
}

footer{
text-align:center;
padding:10px;
font-size:12px;
color:gray;
}

</style>

</head>

<body>

<header>

<h1>TradeSense Dashboard</h1>

<nav>
<a href="#">Home</a>
<a href="#">Strategy</a>
<a href="#">Risk Calculator</a>
</nav>

</header>


<div class="container">

<div class="chart">

<div id="tradingview_chart" style="height:500px;"></div>

</div>


<div class="tools">

<h3>Trade Setup</h3>

<label>Stock / Index</label>
<select id="symbol">
<option value="NSE:NIFTY">NIFTY</option>
<option value="NSE:BANKNIFTY">BANKNIFTY</option>
<option value="NSE:RELIANCE">RELIANCE</option>
<option value="NSE:TCS">TCS</option>
</select>

<label>Entry Price</label>
<input type="number" id="entry">

<label>Stop Loss</label>
<input type="number" id="sl">

<label>Target</label>
<input type="number" id="target">

<button onclick="calculateTrade()">Analyse Trade</button>

<div class="signal" id="result">

Waiting for trade setup...

</div>

</div>

</div>

<footer>

For educational purposes only. Trading involves risk.

</footer>


<script>

new TradingView.widget({
container_id: "tradingview_chart",
autosize: true,
symbol: "NSE:NIFTY",
interval: "5",
timezone: "Asia/Kolkata",
theme: "dark",
style: "1",
toolbar_bg: "#0f172a",
enable_publishing: false,
hide_top_toolbar: false,
withdateranges: true,
studies: ["RSI@tv-basicstudies","MACD@tv-basicstudies"]
});


function calculateTrade(){

let entry=document.getElementById("entry").value;
let sl=document.getElementById("sl").value;
let target=document.getElementById("target").value;

let risk = entry-sl;
let reward = target-entry;

let rr = (reward/risk).toFixed(2);

let signal="";

if(rr>=2){

signal="Strong Trade Setup ✅<br>Risk Reward: 1:"+rr;

}else{

signal="Weak Setup ⚠️<br>Risk Reward: 1:"+rr;

}

document.getElementById("result").innerHTML=signal;

}

</script>

</body>

</html>
